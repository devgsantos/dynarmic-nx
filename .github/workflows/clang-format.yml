name: clang-format

on: [push, pull_request]

jobs:
  clang-format:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        path:
          - 'src'
          - 'tests'

    steps:
    - name: Checkout dynarmic repo
      uses: actions/checkout@v4

    - uses: jidicula/clang-format-action@v4.15.0
      with:
        clang-format-version: '15'
        check-path: ${{ matrix.path }}
